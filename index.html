<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Base</title>
    <style>
        /* Reset & Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111111;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Console supérieure - Dégradé avec texture physique SVG réintégrée */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 8px;
            background-image: 
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.06"/></svg>'),
                linear-gradient(180deg, #2a2a2a 0%, #151515 100%);
            border-bottom: 3px solid #080808;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 8px 20px rgba(0, 0, 0, 0.8);
            z-index: 10;
            gap: 6px;
        }

        /* Logement encastré du bouton */
        .btn-socket {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0f0f0f;
            padding: 6px 3px 8px 3px;
            border-radius: 10px;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.9), 0 1px 1px rgba(255, 255, 255, 0.05);
            gap: 5px;
        }

        .power-socket {
            background: #050505;
            border: 1px solid #000;
        }

        /* LED Squeuomorphique */
        .led {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #222222;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.8);
            transition: all 0.15s ease;
        }

        .power-socket .led { background-color: #4a0000; }

        /* Bouton physique poussoir */
        .pwa-btn {
            width: 100%;
            border: none;
            padding: 12px 0;
            border-radius: 5px;
            font-weight: 800;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888888;
            cursor: pointer;
            position: relative;
            
            /* Rendu plastique 3D */
            background: linear-gradient(180deg, #3d3d3d 0%, #222222 100%);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 4px 0 #111111,
                0 5px 6px rgba(0, 0, 0, 0.6);
                
            transition: none;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .power-btn { background: linear-gradient(180deg, #4a2222 0%, #221111 100%); }

        /* Effet mécanique d'enfoncement (GPU Accelerated) */
        .pwa-btn.active {
            color: #ffffff;
            background: linear-gradient(180deg, #1e1e1e 0%, #2a2a2a 100%);
            transform: translateY(4px);
            box-shadow: 
                inset 0 2px 5px rgba(0, 0, 0, 0.8),
                0 0px 0 #111111,
                0 1px 2px rgba(0, 0, 0, 0.3);
        }

        /* États allumés des LED */
        .btn-socket.active-power .led  { background-color: #ff3b30; box-shadow: 0 0 10px #ff3b30, inset 0 1px 1px rgba(255,255,255,0.6); }
        .btn-socket.active-master .led { background-color: #ff453a; box-shadow: 0 0 10px #ff453a, inset 0 1px 1px rgba(255,255,255,0.6); }
        .btn-socket.active-rea .led    { background-color: #5e5ce0; box-shadow: 0 0 10px #5e5ce0, inset 0 1px 1px rgba(255,255,255,0.6); }
        .btn-socket.active-brain .led  { background-color: #0a84ff; box-shadow: 0 0 10px #0a84ff, inset 0 1px 1px rgba(255,255,255,0.6); }
        .btn-socket.active-sniper .led { background-color: #ff375f; box-shadow: 0 0 10px #ff375f, inset 0 1px 1px rgba(255,255,255,0.6); }
        .btn-socket.active-lab .led    { background-color: #32d74b; box-shadow: 0 0 10px #32d74b, inset 0 1px 1px rgba(255,255,255,0.6); }
        .btn-socket.active-hub .led    { background-color: #ffd60a; box-shadow: 0 0 10px #ffd60a, inset 0 1px 1px rgba(255,255,255,0.6); }
        .btn-socket.active-ibra .led   { background-color: #bf5af2; box-shadow: 0 0 10px #bf5af2, inset 0 1px 1px rgba(255,255,255,0.6); }
        .btn-socket.active-logo .led   { background-color: #ff9f0a; box-shadow: 0 0 10px #ff9f0a, inset 0 1px 1px rgba(255,255,255,0.6); }

        /* Éclairage du texte actif */
        .btn-socket.active-master .pwa-btn.active { text-shadow: 0 0 5px rgba(255, 69, 58, 0.5); }
        .btn-socket.active-rea .pwa-btn.active    { text-shadow: 0 0 5px rgba(94, 92, 224, 0.5); }
        .btn-socket.active-brain .pwa-btn.active  { text-shadow: 0 0 5px rgba(10, 132, 255, 0.5); }
        .btn-socket.active-sniper .pwa-btn.active { text-shadow: 0 0 5px rgba(255, 55, 95, 0.5); }
        .btn-socket.active-lab .pwa-btn.active    { text-shadow: 0 0 5px rgba(50, 215, 75, 0.5); }
        .btn-socket.active-hub .pwa-btn.active    { text-shadow: 0 0 5px rgba(255, 214, 10, 0.5); }
        .btn-socket.active-ibra .pwa-btn.active   { text-shadow: 0 0 5px rgba(191, 90, 242, 0.5); }
        .btn-socket.active-logo .pwa-btn.active   { text-shadow: 0 0 5px rgba(255, 159, 10, 0.5); }
        .btn-socket.active-power .pwa-btn.active  { text-shadow: 0 0 5px rgba(255, 59, 48, 0.6); color: #ff3b30;}

        /* Workspace & Simulation Smartphone */
        .workspace {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-color: #0c0c0c;
        }

        .phone-container {
            width: 100%;
            height: 100%;
            max-width: 412px;
            max-height: 860px;
            background-color: #000000;
            border-radius: 36px;
            border: 8px solid #282828;
            box-shadow: inset 0 0 6px rgba(0,0,0,0.9), 0 30px 60px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Écran physique du smartphone - Texture striée supprimée ici */
        .screen-glass {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 20;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        /* Surcouche d'extinction */
        .power-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000000;
            z-index: 30;
            transition: opacity 0.3s ease-out;
        }

        .hub-powered-on .power-overlay {
            opacity: 0;
            pointer-events: none;
        }

        /* Conteneur iframes */
        .content-area {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #111111;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #1a1a1a;
            display: none;
        }

        iframe.active {
            display: block;
        }

        @media (max-width: 480px) {
            .workspace { padding: 0; }
            .phone-container {
                max-width: 100%; max-height: 100%;
                border-radius: 0; border: none; box-shadow: none;
            }
            .screen-glass { display: none; }
        }
    </style>

<link rel="manifest" href="manifest.json">

<body>

    <!-- Console de commande Physique -->
    <nav class="nav-bar">
        <!-- Interrupteur d'alimentation -->
        <div id="socket-power" class="btn-socket power-socket">
            <div class="led"></div>
            <button id="btn-power" class="pwa-btn power-btn" onclick="togglePower()">PWR</button>
        </div>

        <!-- Boutons des PWA -->
        <div id="socket-master" class="btn-socket">
            <div class="led"></div>
            <button id="btn-master" class="pwa-btn" onclick="switchTab('master', this, 'master')">Master</button>
        </div>

        <!-- NOUVEAU BOUTON REA entre Master et Brain -->
        <div id="socket-rea" class="btn-socket">
            <div class="led"></div>
            <button id="btn-rea" class="pwa-btn" onclick="switchTab('rea', this, 'rea')">Rea</button>
        </div>

        <div id="socket-brain" class="btn-socket">
            <div class="led"></div>
            <button class="pwa-btn" onclick="switchTab('brain', this, 'brain')">Brain</button>
        </div>
        <div id="socket-sniper" class="btn-socket">
            <div class="led"></div>
            <button class="pwa-btn" onclick="switchTab('sniper', this, 'sniper')">Sniper</button>
        </div>
        <div id="socket-lab" class="btn-socket">
            <div class="led"></div>
            <button class="pwa-btn" onclick="switchTab('lab', this, 'lab')">Lab</button>
        </div>
        <div id="socket-hub" class="btn-socket">
            <div class="led"></div>
            <button class="pwa-btn" onclick="switchTab('hub', this, 'hub')">Hub</button>
        </div>
        <div id="socket-ibra" class="btn-socket">
            <div class="led"></div>
            <button class="pwa-btn" onclick="switchTab('ibra', this, 'ibra')">Ibra</button>
        </div>
        <div id="socket-logo" class="btn-socket">
            <div class="led"></div>
            <button class="pwa-btn" onclick="switchTab('logo', this, 'logo')">Logo</button>
        </div>
    </nav>

    <!-- Zone Rendu Smartphone -->
    <main class="workspace">
        <div id="smartphone" class="phone-container">
            <div class="screen-glass"></div>
            <div class="power-overlay"></div>
            
            <div class="content-area">
                <iframe id="iframe-master" data-src="https://mekeirish.github.io/Mastercode/" allow="geolocation; microphone; camera; clipboard-write; clipboard-read"></iframe>
                <iframe id="iframe-rea" data-src="https://mekeirish.github.io/Reaactor/" allow="geolocation; microphone; camera; clipboard-write; clipboard-read"></iframe>
                <iframe id="iframe-brain" data-src="https://mekeirish.github.io/Braincode/" allow="geolocation; microphone; camera; clipboard-write; clipboard-read"></iframe>
                <iframe id="iframe-sniper" data-src="https://mekeirish.github.io/Snipercode/" allow="geolocation; microphone; camera; clipboard-write; clipboard-read"></iframe>
                <iframe id="iframe-lab" data-src="https://mekeirish.github.io/Labcode/" allow="geolocation; microphone; camera; clipboard-write; clipboard-read"></iframe>
                <iframe id="iframe-hub" data-src="https://mekeirish.github.io/Hubcode/" allow="geolocation; microphone; camera; clipboard-write; clipboard-read"></iframe>
                <iframe id="iframe-ibra" data-src="https://mekeirish.github.io/Ibracode/" allow="geolocation; microphone; camera; clipboard-write; clipboard-read"></iframe>
                <iframe id="iframe-logo" data-src="https://mekeirish.github.io/Logomaker/" allow="geolocation; microphone; camera; clipboard-write; clipboard-read"></iframe>
            </div>
        </div>
    </main>

    <script>
        let isPoweredOn = false;

        // Clic audio mécanique : Hum Générateur Industriel
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playIndustrialHum() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05); // Attaque
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);   // Release (Gate 250ms)
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
        }

        function togglePower() {
            playIndustrialHum();
            const btnPower = document.getElementById('btn-power');
            const socketPower = document.getElementById('socket-power');
            const smartphone = document.getElementById('smartphone');

            isPoweredOn = !isPoweredOn;

            if (isPoweredOn) {
                btnPower.classList.add('active');
                socketPower.classList.add('active-power');
                smartphone.classList.add('hub-powered-on');
                
                const masterBtn = document.getElementById('btn-master');
                if(!document.querySelector('.pwa-btn.active:not(#btn-power)')) {
                    switchTab('master', masterBtn, 'master');
                }
            } else {
                btnPower.classList.remove('active');
                socketPower.classList.remove('active-power');
                smartphone.classList.remove('hub-powered-on');
            }
        }

        // Lazy Loading
        function switchTab(targetId, button, colorName) {
            if (!isPoweredOn) return;
            if (button.classList.contains('active')) return;

            playIndustrialHum();

            document.querySelectorAll('.pwa-btn:not(#btn-power)').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.btn-socket:not(#socket-power)').forEach(socket => {
                socket.className = 'btn-socket';
            });

            button.classList.add('active');
            const parentSocket = document.getElementById(`socket-${targetId}`);
            parentSocket.classList.add(`active-${colorName}`);

            document.querySelectorAll('.content-area iframe').forEach(iframe => {
                iframe.classList.remove('active');
            });
            
            const targetIframe = document.getElementById(`iframe-${targetId}`);
            targetIframe.classList.add('active');
            
            if (!targetIframe.src || targetIframe.src === window.location.href) {
                targetIframe.src = targetIframe.getAttribute('data-src');
            }
        }

        // Hub Routeur PostMessage
        window.addEventListener('message', (event) => {
            const msg = event.data;
            if (msg && msg.type === 'HUB_ROUTER' && msg.target) {
                const targetIframe = document.getElementById(`iframe-${msg.target}`);
                if (targetIframe) {
                    if (!targetIframe.src || targetIframe.src === window.location.href) {
                        targetIframe.src = targetIframe.getAttribute('data-src');
                        targetIframe.onload = () => {
                            targetIframe.contentWindow.postMessage(msg.payload, '*');
                        };
                    } else {
                        targetIframe.contentWindow.postMessage(msg.payload, '*');
                    }
                }
            }
        });
    </script>
